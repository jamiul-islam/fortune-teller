<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geo Language Detector Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
      }
      .result {
        background: #f0f0f0;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
      }
      button {
        background: #0070f3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #0051cc;
      }
      .loading {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Geo Language Detector Test</h1>

    <button onclick="detectLanguage()">Detect Language by Location</button>

    <div id="result" class="result">
      <p class="loading">
        Click the button to detect your language based on location...
      </p>
    </div>

    <script>
      const FRENCH_SPEAKING_COUNTRIES = [
        "FR",
        "BE",
        "CH",
        "CA",
        "LU",
        "MC",
        "CI",
        "SN",
        "ML",
        "BF",
        "NE",
        "TD",
        "CM",
        "CG",
        "CD",
        "GA",
        "GN",
        "MG",
        "BJ",
        "TG",
        "CF",
        "RW",
        "BI",
        "DJ",
        "KM",
        "SC",
        "HT",
      ];

      async function detectLanguage() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML =
          '<p class="loading">Detecting your location...</p>';

        try {
          const response = await fetch("https://ipapi.co/json/");
          const data = await response.json();

          const countryCode = data.country_code.toUpperCase();
          const shouldUseFrench =
            FRENCH_SPEAKING_COUNTRIES.includes(countryCode);
          const detectedLocale = shouldUseFrench ? "fr" : "en";

          resultDiv.innerHTML = `
                    <h3>Detection Results:</h3>
                    <p><strong>Country:</strong> ${data.country_name} (${countryCode})</p>
                    <p><strong>City:</strong> ${data.city}</p>
                    <p><strong>Region:</strong> ${data.region}</p>
                    <p><strong>IP:</strong> ${data.ip}</p>
                    <p><strong>Detected Language:</strong> ${detectedLocale === "fr" ? "French (Français)" : "English"}</p>
                    <p><strong>Browser Language:</strong> ${navigator.language}</p>
                `;
        } catch (error) {
          resultDiv.innerHTML = `
                    <h3>Error:</h3>
                    <p style="color: red;">${error.message}</p>
                    <p>Falling back to browser language: ${navigator.language}</p>
                    <p>Detected: ${navigator.language.startsWith("fr") ? "French" : "English"}</p>
                `;
        }
      }
    </script>
  </body>
</html>
